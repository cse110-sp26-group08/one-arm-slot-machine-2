name: Deploy README to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Convert README to index.html
        run: |
          # 1. Remove the original index.html so it doesn't take priority
          rm -f index.html 
          
          # 2. Use Pandoc (built-in on GitHub Runners) to convert README to index.html
          # This ensures there is a real .html file for the server to find.
          pandoc README.md -s -o index.html --metadata title="Project README"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This uploads the current directory containing our new index.html
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
