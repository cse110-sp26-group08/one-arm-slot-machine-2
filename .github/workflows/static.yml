name: Deploy README to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Generate index.html from README
        run: |
          # Remove original index.html
          rm -f index.html
          
          # Rename README to index.md (Jekyll will convert this automatically)
          mv README.md index.md
          
          # Create a configuration file to tell Jekyll to process the markdown
          echo "theme: jekyll-theme-minimal" > _config.yml
          echo "title: One Arm Slot Machine 2" >> _config.yml

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
