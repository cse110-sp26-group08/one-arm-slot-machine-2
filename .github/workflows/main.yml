name: Lint frontend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Lint CSS
        run: npx stylelint "**/*.{css,scss}"

      - name: Lint HTML
        run: npx htmlhint "**/*.html"